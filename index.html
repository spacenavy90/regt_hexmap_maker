<!DOCTYPE html>
<html>
<head>
    <title>Regiment | Hexmap Maker</title>
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div class="app-container">
        <header class="toolbar">
            <div class="tool-group">
                <span class="group-label">Terrain</span>
                <div class="button-row">
                    <button data-tool="Open" onclick="setTool('Open')" class="active-tool">Open</button>
                    <button data-tool="Hills" onclick="setTool('Hills')">Hills</button>
                    <button data-tool="Forest" onclick="setTool('Forest')">Forest</button>
                    <button data-tool="Wetland" onclick="setTool('Wetland')">Wetland</button>
                    <button data-tool="Mountain" onclick="setTool('Mountain')">Mountain</button>
                    <button data-tool="Water" onclick="setTool('Water')">Water</button>
                    <button data-tool="River" onclick="setTool('River')">River</button>
                </div>
            </div>

            <div class="tool-group">
                <span class="group-label">Structures</span>
                <div class="button-row">
                    <button data-tool="VP" onclick="setTool('VP')">VP</button>
                    <button data-tool="Capital" onclick="setTool('Capital')">Capital</button>
                    <button data-tool="Road" onclick="setTool('Road')">Road</button>
                </div>
            </div>

            <div class="tool-group no-border">
                <span class="group-label">Biome</span>
                <select id="biomeSelect" onchange="changeBiome(this.value)">
                    <option value="Temperate">Temperate</option>
                    <option value="Desert">Desert</option>
                    <option value="Snow">Snow</option>
                </select>
            </div>
        </header>

        <main class="canvas-area">
            <canvas id="mapCanvas" width="800" height="800"></canvas>
        </main>

        <footer class="status-bar">
            <div class="status-item">Tool: <span id="active-tool">Open</span></div>
            <div class="status-item">Coordinates: <span id="hex-coords">0, 0</span></div>
        </footer>

        <div class="toolbar">
            <div class="tool-group">
                <span class="group-label">System</span>
                <div class="button-row">
                    <button data-tool="Eraser" onclick="setTool('Eraser')" style="background: #ffcccc; color: #cc0000;">Eraser</button>
                    <button onclick="clearMap()" style="background: #ffcccc; color: #cc0000;">Clear All</button>
                    <button id="gridToggleBtn" onclick="toggleGrid()">Grid: White</button>
                    <button onclick="rotateMap()">Rotate 60°</button>
                    <button onclick="mirrorMap('horizontal')">Mirror H</button>
                    <button onclick="mirrorMap('vertical')">Mirror V</button>
                </div>
            </div>
            
            <div class="tool-group no-border">
                <span class="group-label">Project</span>
                <div class="button-row">
                    <button onclick="saveProject()">Save Map</button>
                    <button onclick="document.getElementById('fileInput').click()">Load Map</button>
                    <button onclick="resetMap()" style="background: #ffcccc; color: #cc0000;">Reset Map</button>
                    <input type="file" id="fileInput" style="display: none;" accept=".json" onchange="loadProject(event)">
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="tool-group">
                <span class="group-label">Share Code</span>
                <div class="button-row">
                    <button onclick="generateMap()">Random Map</button>
                    <input type="text" id="mapSeed" class="seed-input" placeholder="Paste code here...">
                    <button id="copyBtn" onclick="copyShareCode()">Copy Code</button>
                    <button onclick="loadShareCode()">Load Code</button>
                </div>
            </div>

            <div class="tool-group no-border">
                <span class="group-label">Export</span>
                <div class="button-row">
                    <select id="exportScale">
                        <option value="1">Standard (800px)</option>
                        <option value="2.56">High-Res (2K)</option>
                        <option value="5.12">Extreme (4K)</option>
                        <option value="10.24">Print (8K)</option>
                    </select>
                    <button onclick="downloadMap()">Save PNG</button>
                </div>
            </div>
        </div>

        <div class="support-links">
            <a href="https://github.com/spacenavy90/regt_hexmap_maker" target="_blank" class="nav-btn">GitHub</a>
            <a href="https://www.paypal.com/donate/?hosted_button_id=2YP5AY9JT7T5J" target="_blank" class="nav-btn donate-btn">Donate</a>
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
